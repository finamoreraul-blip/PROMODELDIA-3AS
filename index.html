<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#25D366">
  <title>Promo del Día - Tres Arroyos</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:linear-gradient(135deg,#25D366 0%,#128C7E 100%);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px
    }
    .container{
      background:white;
      border-radius:24px;
      padding:40px 30px;
      max-width:420px;
      width:100%;
      box-shadow:0 20px 60px rgba(0,0,0,0.3);
      text-align:center
    }
    .emoji{font-size:64px;margin-bottom:20px}
    h1{color:#25D366;font-size:28px;margin-bottom:10px}
    .subtitle{color:#666;font-size:16px;margin-bottom:30px}
    .promo-box{
      background:#f0f9f4;
      border:2px dashed #25D366;
      border-radius:16px;
      padding:25px;
      margin-bottom:25px
    }
    .promo-title{font-size:20px;font-weight:bold;color:#128C7E;margin-bottom:8px}
    .promo-desc{color:#555;font-size:15px;line-height:1.6}
    .btn{
      display:block;
      background:#25D366;
      color:white;
      padding:16px;
      border-radius:12px;
      text-decoration:none;
      font-weight:bold;
      font-size:17px;
      transition:transform 0.2s
    }
    .btn:active{transform:scale(0.96)}
    .footer{margin-top:25px;font-size:12px;color:#999}
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🔥</div>
    <h1>Promo del Día</h1>
    <p class="subtitle">Tres Arroyos</p>
    
    <div class="promo-box">
      <div class="promo-title">2x1 en Cafés</div>
      <div class="promo-desc">
        Válido solo hoy<br>
        De 9:00 a 12:00 hs<br>
        Presentando esta pantalla
      </div>
    </div>
    
    <a href="#" class="btn">Compartir Promo</a>
    
    <p class="footer">PWA funcionando ✅</p>
  </div>

  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registrado'))
          .catch(err => console.log('SW error:', err));
      });
    }
  </script>
</body>
</html>
